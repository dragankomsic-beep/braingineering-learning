<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KI-Awareness Schulung | Braingineering</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root{--c-primary:#122D6E;--c-accent:#FF5100;--c-white:#FFFFFF;--c-surface:#F0F2F8;--g-blue:linear-gradient(135deg,#122D6E 0%,#1a3fa0 50%,#2255d4 100%);--g-orange:linear-gradient(135deg,#FF5100 0%,#e03d00 100%);--correct:#0a8754;--wrong:#c0392b;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:var(--c-surface);color:var(--c-primary);min-height:100vh;-webkit-font-smoothing:antialiased}

/* === SHELL === */
.app{max-width:720px;margin:0 auto;padding:16px;min-height:100vh}

/* === HEADER === */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 0 20px}
.hdr-bolt{width:32px;height:32px;background:var(--c-accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-txt{font-size:17px;font-weight:700;color:var(--c-primary)}

/* === PROGRESS === */
.prog-wrap{background:#d9dde8;border-radius:100px;height:6px;margin-bottom:6px;overflow:hidden}
.prog-fill{height:100%;background:var(--g-orange);border-radius:100px;transition:width .5s ease;width:0%}
.prog-lbl{font-size:12px;color:var(--c-primary);opacity:.5;margin-bottom:20px}

/* === CARDS === */
.card{background:var(--c-white);border-radius:var(--radius);padding:32px;box-shadow:0 2px 16px rgba(18,45,110,.06);margin-bottom:16px}
.card-dk{background:var(--g-blue);border-radius:var(--radius);padding:32px;color:var(--c-white);margin-bottom:16px}
.card-dk *{color:var(--c-white)}

/* === MODULE NAV (scenario dots) === */
.scn-nav{display:flex;align-items:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.scn-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:1.5px solid rgba(18,45,110,.15);background:var(--c-white);color:var(--c-primary);cursor:default;transition:all .2s}
.scn-dot.done{background:var(--correct);color:white;border-color:var(--correct);cursor:pointer}
.scn-dot.active{border-color:var(--c-accent);background:#fff5f0;color:var(--c-accent)}
.scn-dot.locked{opacity:.35;cursor:default}
.scn-sep{font-size:11px;color:var(--c-primary);opacity:.3;margin:0 2px}

/* === TYPOGRAPHY === */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--c-accent);margin-bottom:10px}
.card-dk .badge{color:rgba(255,255,255,.65)}
h1{font-size:24px;font-weight:700;line-height:1.25;margin-bottom:14px}
h2{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:12px}
p,li{font-size:15px;line-height:1.65}
p+p{margin-top:10px}

/* === SITUATION === */
.situ{background:var(--c-surface);border-radius:10px;padding:18px 20px;margin:16px 0;border-left:3px solid var(--c-accent)}
.situ .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-accent);margin-bottom:6px}
.situ p{font-size:14px}
.ai-out{background:#f8f8fc;border:1px solid #e0e3ed;border-radius:8px;padding:14px 16px;margin:10px 0;font-size:13.5px;font-style:italic;opacity:.85}

/* === QUESTION === */
.q-text{font-size:15px;font-weight:700;margin:16px 0 14px}

/* === OPTIONS === */
.opts{display:flex;flex-direction:column;gap:8px}
.ob{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-radius:10px;border:1.5px solid rgba(18,45,110,.13);background:var(--c-white);cursor:pointer;transition:all .15s;text-align:left;font-family:'Manrope',sans-serif;font-size:14px;line-height:1.5;color:var(--c-primary);width:100%}
.ob:hover:not(.dis){border-color:var(--c-accent);background:#fff8f5;transform:translateY(-1px)}
.ob:active:not(.dis){transform:translateY(0)}
.ob .lt{min-width:26px;height:26px;border-radius:7px;background:var(--c-surface);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;margin-top:1px}
.ob.ok{border-color:var(--correct);background:#eafaf1}
.ob.ok .lt{background:var(--correct);color:white}
.ob.no{border-color:var(--wrong);background:#fdf0ee}
.ob.no .lt{background:var(--wrong);color:white}
.ob.dis{cursor:default;opacity:.45}
.ob.ok.dis,.ob.no.dis{opacity:1}

/* === FEEDBACK === */
.fb{border-radius:10px;padding:18px 20px;margin-top:14px;font-size:14px;line-height:1.6}
.fb.fb-ok{background:#eafaf1;border-left:3px solid var(--correct)}
.fb.fb-no{background:#fdf0ee;border-left:3px solid var(--wrong)}
.fb .ft{font-weight:700;margin-bottom:6px;font-size:13px}
.fb.fb-ok .ft{color:var(--correct)}
.fb.fb-no .ft{color:var(--wrong)}
.fb p{font-size:13.5px}
.fb .merke{margin-top:10px;padding:10px 14px;background:rgba(18,45,110,.05);border-radius:7px;font-size:13px;font-weight:700}

/* === INFO EXPAND === */
.ix{margin-top:12px}
.ix-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--c-accent);cursor:pointer;background:none;border:none;font-family:'Manrope',sans-serif;padding:0}
.ix-btn i{transition:transform .2s}
.ix-btn.open i{transform:rotate(180deg)}
.ix-body{display:none;margin-top:8px;padding:14px 16px;background:var(--c-surface);border-radius:8px;font-size:13.5px;line-height:1.6}
.ix-body.show{display:block}
.ix-body h4{font-size:13.5px;font-weight:700;margin-bottom:4px}
.ix-body p+h4{margin-top:10px}

/* === WISSENSBLOCK === */
.wb{background:var(--c-surface);border-radius:10px;padding:20px;margin:16px 0}
.wb h4{font-size:14px;margin-bottom:8px}
.wb p{font-size:13.5px}

/* === BTN HELPERS === */
.btn-p{background:#FF5100;color:#FFFFFF;border:none;border-radius:8px;padding:11px 24px;font-family:'Manrope',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:opacity .15s}
.btn-p:hover{opacity:.9}
.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-w{background:#FFFFFF;color:#122D6E;border:none;border-radius:8px;padding:11px 24px;font-family:'Manrope',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.btn-g{background:transparent;color:#122D6E;border:1.5px solid rgba(18,45,110,.25);border-radius:8px;padding:10px 20px;font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}

/* === WELCOME === */
.w-meta{display:flex;flex-wrap:wrap;gap:14px;margin:16px 0}
.w-meta .mi{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.75)}
.w-meta .mi i{font-size:16px;opacity:.5}
.ml{list-style:none;padding:0;margin:14px 0 0}
.ml li{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:14px;border-bottom:1px solid rgba(255,255,255,.08)}
.ml li:last-child{border:none}
.ml .mn{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}

/* === CERTIFICATE === */
.cert-gate{display:none}
.cert-gate.show{display:block}
.ci{display:block;width:100%;max-width:380px;margin:0 auto 10px;padding:11px 14px;border-radius:8px;border:1.5px solid rgba(18,45,110,.18);font-family:'Manrope',sans-serif;font-size:14px;color:var(--c-primary);background:var(--c-white)}
.ci:focus{outline:none;border-color:var(--c-accent)}

/* Cert document — compact A4 */
.cert-doc{background:white;border:1px solid #d0d4e0;padding:28px 32px 24px;max-width:640px;margin:20px auto 0;position:relative}
.cert-doc .c-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--c-primary)}
.cert-doc .c-hdr-logo{display:flex;align-items:center;gap:7px}
.cert-doc .c-hdr-contact{text-align:right;font-size:9px;line-height:1.45;color:var(--c-primary);opacity:.55}
.cert-doc .c-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-accent);margin-bottom:12px}
.cert-doc .c-to{margin-bottom:10px;font-size:11px;line-height:1.5}
.cert-doc .c-to .c-to-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-primary);opacity:.5;margin-bottom:2px}
.cert-doc .c-name{font-size:16px;font-weight:700;color:var(--c-primary)}
.cert-doc .c-role,.cert-doc .c-comp{font-size:11px;color:var(--c-primary);opacity:.7}
.cert-doc .c-body{font-size:10.5px;line-height:1.6;color:var(--c-primary);margin:10px 0}
.cert-doc .c-mods{margin:6px 0 10px;padding:0}
.cert-doc .c-mods li{display:flex;gap:5px;font-size:10px;line-height:1.5;color:var(--c-primary);padding:1.5px 0}
.cert-doc .c-mods li .cm-n{font-weight:700;min-width:14px;flex-shrink:0}
.cert-doc .c-mods li .cm-t{font-weight:700}
.cert-doc .c-foot{margin-top:14px;padding-top:12px;border-top:1px solid #e0e3ed;display:flex;justify-content:space-between;align-items:flex-end}
.cert-doc .c-foot-left{font-size:10px;line-height:1.45;color:var(--c-primary)}
.cert-doc .c-foot-right{font-size:9px;text-align:right;color:var(--c-primary);opacity:.5;line-height:1.35}
.cert-doc .c-accent-line{height:3px;background:var(--g-orange);position:absolute;bottom:0;left:0;right:0}

.ph{text-align:center;margin-top:14px;font-size:12px;color:var(--c-primary);opacity:.5}
.ph i{margin-right:3px}

/* === PRINT === */
@media print{
  body{background:white}
  .app{padding:0;max-width:100%}
  .hdr,.prog-wrap,.prog-lbl,.ph,.no-print,.card-dk,.card,.scn-nav{display:none!important}
  .cert-gate{display:block!important}
  .cert-doc{border:none;box-shadow:none;padding:40px 36px;margin:0;max-width:100%}
}

/* === MOBILE === */
@media(max-width:600px){
  .app{padding:12px}
  .card,.card-dk{padding:22px 18px}
  h1{font-size:20px}
  h2{font-size:18px}
  p,li{font-size:14px}
  .situ{padding:14px 16px}
  .ob{padding:12px 14px;font-size:13px}
  .ob .lt{min-width:24px;height:24px;font-size:11px}
  .scn-dot{width:28px;height:28px;font-size:11px}
  .btn-p,.btn-w{padding:10px 18px;font-size:13px}
  .cert-doc{padding:28px 20px}
  .cert-doc .c-hdr{flex-direction:column;gap:10px}
  .cert-doc .c-hdr-contact{text-align:left}
  .cert-doc .c-foot{flex-direction:column;gap:12px;align-items:flex-start}
  .cert-doc .c-foot-right{text-align:left}
  .cert-doc .c-name{font-size:18px}
}
@media(max-width:380px){
  .card,.card-dk{padding:18px 14px}
  h1{font-size:18px}
  .cert-doc{padding:20px 14px}
}

.lang-toggle{position:absolute;right:20px;top:50%;transform:translateY(-50%);display:flex;border-radius:8px;overflow:hidden;border:1.5px solid rgba(18,45,110,.12)}
.lang-btn{padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all .15s}
.lang-btn.active{background:var(--c-primary);color:white}
.lang-btn:not(.active){background:white;color:var(--c-primary)}
.lang-btn:hover:not(.active){background:#F0F2F8}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr" style="position:relative">
  <div class="lang-toggle"><button class="lang-btn active" data-lang="de" onclick="switchLang('de')">DE</button><button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button></div>
    <div class="hdr-bolt"><svg width="14" height="18" viewBox="0 0 14 18" fill="none"><path d="M8.5 1L1 10.5H7L5.5 17L13 7.5H7L8.5 1Z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/></svg></div>
    <span class="hdr-txt">braingineering.</span>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="pf"></div></div>
  <div class="prog-lbl" id="pl">Willkommen</div>
  <div id="sc"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const M=[
{id:'m1',title:'Was ist KI?',icon:'ri-robot-2-line',desc:'Erkennen, was KI ist und was nicht',intro:{ey:'Modul 1 von 5',h:'Was ist Künstliche Intelligenz?',t:'Künstliche Intelligenz begegnet Ihnen im Arbeitsalltag häufiger, als Sie vielleicht denken. Manche Tools, die Sie täglich verwenden, nutzen KI im Hintergrund. Andere, die sich "intelligent" anfühlen, tun es nicht. In diesem Modul lernen Sie, den Unterschied zu erkennen.'},scenarios:[
{sit:'Ihre Kollegin sagt: "Ich nutze gar keine KI bei der Arbeit." Sie arbeitet täglich mit Microsoft Outlook (mit Copilot-Funktionen), einer Excel-Tabelle mit WENN-Formeln, Google Maps für Baustellenanfahrten und einem Spamfilter.',q:'Welche dieser Tools nutzen KI?',opts:['Nur Microsoft Copilot','Copilot und der Spamfilter','Copilot, der Spamfilter und Google Maps','Alle vier, auch Excel-Formeln'],c:2,fb:{ok:'Genau. Microsoft Copilot ist generative KI. Der Spamfilter nutzt maschinelles Lernen. Google Maps verwendet maschinelles Lernen für Verkehrsprognosen (die Routenberechnung selbst nutzt klassische Algorithmen). Excel-Formeln hingegen sind regelbasierte Automatisierung: feste Regeln ohne zu "lernen".',no:['Nicht ganz. Auch der Spamfilter nutzt maschinelles Lernen und Google Maps verwendet KI für Verkehrsprognosen. Viele KI-Systeme arbeiten unsichtbar im Hintergrund.','Nicht ganz. Auch Google Maps verwendet KI für Verkehrsprognosen und Routenoptimierung.','Fast. Excel-Formeln sind keine KI. Sie folgen festen Regeln: WENN A > B, DANN C. Kein Lernen, keine Vorhersagen. Die anderen drei nutzen tatsächlich KI.']}},
{sit:'Ihr Vorgesetzter fragt: "Was ist der Unterschied zwischen ChatGPT und der automatischen Kategorisierung in unserem Dokumentenmanagementsystem?"',q:'Was ist der wesentliche Unterschied?',opts:['ChatGPT ist ein externer Dienst, das DMS ein internes System. Anderer Preis, andere Kategorie.','ChatGPT erzeugt neue Inhalte, das DMS sortiert bestehende nach gelernten Mustern','ChatGPT ist echte KI, das DMS ist nur Software','Kein wesentlicher Unterschied, beides ist KI'],c:1,fb:{ok:'Richtig. ChatGPT ist generative KI: Sie erzeugt neue Texte und Antworten. Das DMS nutzt analytische KI: Es erkennt Muster und sortiert. Generative KI kann "halluzinieren", analytische KI kann falsch einordnen, erfindet aber keine neuen Inhalte.',no:['Der Preis ist nicht der Unterschied. ChatGPT erzeugt neue Inhalte (generativ), das DMS sortiert bestehende (analytisch). Beides ist KI, mit unterschiedlichen Risiken.','Beides ist KI, nur unterschiedliche Arten. Die Unterscheidung beeinflusst, wie vorsichtig Sie mit dem Output umgehen müssen.','Beides ist KI, aber der Unterschied ist wichtig: Generative KI erzeugt neue Inhalte (Halluzinationsrisiko), analytische KI sortiert bestehende Daten.']}},
{sit:'Ihre Geschäftsführung will eine Bestandsaufnahme: Welche KI-Systeme nutzt die Abteilung?',q:'Welche Tätigkeit nutzt KI?',opts:['Automatischer E-Mail-Versand jeden Montag um 8:00','Ein Tool, das aus einem Diktat ein strukturiertes Protokoll erstellt','Eine Excel-Pivot-Tabelle, die Projektkosten zusammenfasst','Ein Makro, das Dateinamen nach festem Schema umbenennt'],c:1,fb:{ok:'Genau. Sprache in strukturierten Text umwandeln erfordert Spracherkennung und Textverarbeitung (KI). Die anderen Beispiele sind regelbasierte Automatisierung ohne Lernfähigkeit. Für KI-Systeme gelten die Anforderungen des EU AI Act.',no:['Das ist regelbasierte Automatisierung. Die richtige Antwort: Sprache in strukturierten Text umwandeln erfordert KI.','Das ist regelbasierte Automatisierung. Die richtige Antwort: Sprache in strukturierten Text umwandeln erfordert KI.','Das ist ein festes Schema, keine Lernfähigkeit. Die richtige Antwort: Sprache in strukturierten Text umwandeln erfordert KI.']}}
,
{sit:'Ein Kollege lässt eine KI-Zusammenfassung über Messwerte aus einem Prüfbericht erstellen. Die KI schreibt: "Alle Messwerte liegen im Normbereich." Im Original stehen 47 Einzelmessungen.',q:'Können Sie der Zusammenfassung vertrauen?',opts:['Ja, KI ist besonders gut im Umgang mit Zahlen und Tabellen','Nicht ohne Stichprobe. KI kann einzelne Ausreißer übersehen.','Nur wenn man die KI explizit nach Ausreißern fragt'],c:1,fb:{ok:'Richtig. KI-Sprachmodelle arbeiten textbasiert. Sie lesen Zahlen als Wörter, nicht als mathematische Werte. Ein Messwert knapp über der Norm kann in einer Zusammenfassung untergehen. Bei sicherheitsrelevanten Daten immer eine Stichprobe machen.',m:'KI ist stark bei Textzusammenfassungen, aber nicht zuverlässig bei der Interpretation von Messwerten und Zahlentabellen.',no:['KI-Sprachmodelle rechnen nicht. Sie verarbeiten Zahlen als Text und können Ausreißer oder Grenzwertüberschreitungen übersehen.','Auch mit gezielter Nachfrage kann die KI Zahlenwerte falsch einordnen. Die Stichprobe im Original bleibt unverzichtbar.']}}
],summary:'<h4>Drei Arten von KI:</h4><p><strong>Generative KI</strong> erzeugt neue Inhalte (ChatGPT, Claude). Risiko: Halluzinationen, auch bei Rechtstexten und Normenverweisen.</p><p><strong>Analytische KI</strong> erkennt Muster (Spamfilter, DMS). Risiko: Fehlinterpretation.</p><p><strong>Regelbasierte Automatisierung</strong> ist keine KI (Excel-Formeln, Makros). Der EU AI Act betrifft nur echte KI-Systeme.</p>'},

{id:'m2',title:'Chancen und Grenzen',icon:'ri-scales-3-line',desc:'KI-Outputs kritisch bewerten',intro:{ey:'Modul 2 von 5',h:'Chancen und Grenzen von KI',t:'KI-Tools können im Ingenieurbüro enorm viel Zeit sparen. Aber sie haben eine entscheidende Schwäche: Sie klingen immer überzeugend, auch wenn sie falsch liegen. In diesem Modul lernen Sie, wie Sie KI-Outputs richtig einschätzen.'},scenarios:[
{sit:'Sie nutzen ein KI-Tool für eine Normenrecherche. Es liefert:',ai:'"Gemäß ÖNORM B 4700-2:2023, Abschnitt 7.3.2, beträgt die Mindestbewehrung 0,15% des Betonquerschnitts."',sitA:'Die Antwort klingt detailliert und überzeugend.',q:'Was tun Sie?',opts:['Direkt in meine Berechnung übernehmen','Die Normenstelle in der Originalnorm nachschlagen und prüfen','Einen erfahrenen Kollegen fragen, der sich mit der Norm auskennt, und dessen Einschätzung übernehmen'],c:1,fb:{ok:'Richtig. In diesem Fall existiert die ÖNORM B 4700-2:2023 gar nicht in dieser Form. Das Tool hat eine plausibel klingende, aber erfundene Norm generiert.',m:'KI-Tools kennen keine "Wahrheit". Je spezifischer die Angabe, desto höher das Halluzinationsrisiko.',no:['Gefährlich. KI-Tools können Normen und Zahlenwerte erfinden, die korrekt aussehen. In diesem Fall existiert die genannte ÖNORM nicht. Das ist ein Haftungsrisiko.','Besser als direkt übernehmen, aber Ihr Kollege könnte es auch plausibel finden. Die einzig sichere Prüfung ist der Abgleich mit der Originalnorm.']}},
{sit:'Sie lassen ein 80-seitiges Gutachten zusammenfassen. Die KI schreibt, das Gebäude habe "keine wesentlichen Mängel". Sie erinnern sich vage an etwas über Fassadenrisse im Original.',q:'Wie gehen Sie vor?',opts:['Die Zusammenfassung passt, das Detail war unwichtig','Den Abschnitt im Original nachschlagen und korrigieren','Das KI-Tool nochmal fragen: "Gab es nicht Mängel?"'],c:1,fb:{ok:'Richtig. KI-Zusammenfassungen können Informationen weglassen oder anders gewichten. Die Originalquelle ist immer die verbindliche Referenz.',m:'KI-Zusammenfassungen sind Arbeitshilfen, keine Ersatzdokumente. Je länger der Originaltext, desto eher gehen Details verloren.',no:['Riskant. Eine KI-Zusammenfassung kann kritische Informationen weglassen. Wenn Sie das Gutachten weitergeben, tragen Sie die Verantwortung.','Das KI-Tool könnte den Mangel bestätigen, ihn aber falsch beschreiben. Die einzig sichere Methode ist der Abgleich mit dem Original.']}},
{sit:'Ein Kollege hat mit KI einen Angebots-Entwurf erstellt. Der Text ist professionell, enthält aber Leistungspositionen, die Ihr Büro gar nicht anbietet.',q:'Wie bewerten Sie das?',opts:['Die offensichtlich falschen Positionen rauslöschen und das Leistungsverzeichnis direkt absenden','KI sollte nicht für Angebote verwendet werden','KI als Entwurfshilfe ist sinnvoll, aber der Output muss vollständig geprüft werden'],c:2,fb:{ok:'Genau. KI-Tools sind hervorragende Entwurfshelfer, kennen aber Ihr Büro nicht. Jeder Output, der das Büro verlässt, muss geprüft und freigegeben werden.',m:'KI erstellt den Entwurf, Sie tragen die Verantwortung.',no:['Die offensichtlichen Fehler zu korrigieren reicht nicht. Was ist mit subtileren Fehlern? Der gesamte Entwurf braucht eine vollständige Prüfung.','Zu pauschal. KI kann bei Angeboten erheblich Zeit sparen. Das Problem ist nicht das Tool, sondern der fehlende Prüfschritt.']}}
],summary:'<h4>Drei Regeln für KI-Outputs:</h4><p><strong>1. Nie ungeprüft übernehmen.</strong> Besonders bei Normenverweisen, Zahlenwerten und fachlichen Details.</p><p><strong>2. KI ist Entwurfshilfe, nicht Endprodukt.</strong> Prüfung und Freigabe bleibt bei Ihnen.</p><p><strong>3. Im Zweifel: Originalquelle.</strong> "Die KI hat das geschrieben" ist kein Haftungsausschluss.</p>'},

{id:'m3',title:'Datenschutz und DSGVO',icon:'ri-shield-check-line',desc:'Wissen, welche Daten in welches Tool dürfen',intro:{ey:'Modul 3 von 5',h:'Datenschutz und DSGVO',t:'Jedes Mal, wenn Sie Text in ein KI-Tool eingeben, werden Daten an einen Server übertragen. Wo steht dieser Server? Was passiert mit Ihren Daten? In diesem Modul lernen Sie, welche Tools sicher sind und welche nicht.'},scenarios:[
{sit:'Freitagnachmittag, Deadline am Montag. Sie müssen ein 40-seitiges Leistungsverzeichnis zusammenfassen. Eine Kollegin sagt: "Kopier das in ChatGPT, geht in 2 Minuten." Sie hat einen privaten ChatGPT Plus-Account.',q:'Was tun Sie?',opts:['Gute Idee, Plus ist die Bezahlversion','Das LV enthält Kundendaten, das darf nicht in ChatGPT','Nur den Teil ohne Kundennamen reinkopieren'],c:1,fb:{ok:'Richtig. ChatGPT Plus ist eine Konsumenten-Lizenz. Daten auf US-Servern, kein DPA (Datenverarbeitungsvertrag). Leistungsverzeichnisse enthalten Projektbezeichnungen, Kundennamen, Adressen und technische Details.',iT:'Konsumenten- vs. Business-Lizenzen',i:'<h4>Nicht DSGVO-konform für Firmendaten:</h4><p>ChatGPT Free/Plus/Pro, Google Gemini, Grok Free, Perplexity. Server in den USA, kein DPA.</p><h4>Bedingt DSGVO-konform:</h4><p>Microsoft Copilot über M365-Tenant (EU Data Boundary). ChatGPT Enterprise (EU-Datenresidenz, aber US-Jurisdiktion).</p><h4>Volle Kontrolle:</h4><p>Selbst gehostete Systeme. Alle Daten in der EU oder im eigenen Haus.</p>',no:['"Bezahlt" bedeutet nicht "DSGVO-konform". ChatGPT Plus ist eine Konsumenten-Lizenz mit US-Servern und ohne DPA.','Kaum durchführbar. Leistungsverzeichnisse enthalten fast immer indirekt zuordenbare Informationen: Projektstandorte, spezifische Anforderungen, Mengenangaben.']}},
{sit:'Ein Kollege sagt: "Copilot und ChatGPT sind doch das Gleiche. Warum darf ich Copilot benutzen, aber ChatGPT nicht?"',q:'Was ist die korrekte Antwort?',opts:['Stimmt, beides nutzt KI-Modelle und sollte im Büro verboten werden. Zu unsicher.','Ähnliche Technologie, anderer Datenschutz. Copilot: EU. ChatGPT Free: USA.','ChatGPT hat die besseren Modelle. Am besten Enterprise kaufen, dann ist alles abgedeckt.'],c:1,fb:{ok:'Exakt. Beide nutzen ähnliche Sprachmodelle. Aber Copilot über Ihren M365-Tenant verarbeitet Daten in der EU. ChatGPT Free/Plus hat diese Absicherung nicht.',m:'Das Problem ist nicht die Technologie, sondern wo die Daten verarbeitet werden.',no:['Copilot über M365-Tenant ist DSGVO-konform. Alles zu verbieten nimmt Ihnen einen erheblichen Produktivitätsvorteil.','ChatGPT Enterprise ist besser als die Konsumenten-Version, bleibt aber ein US-Anbieter unter US-Jurisdiktion (CLOUD Act).']}},
{sit:'Sie wollen eine E-Mail an einen Kunden formulieren. In Ihren Stichpunkten: Kundenname, Gebäude, festgestellte Mängel.',q:'In welches Tool dürfen Sie die Stichpunkte eingeben?',opts:['ChatGPT Plus, das ist die Bezahlversion und damit datenschutzkonform genug','Microsoft Copilot über den Firmen-Tenant oder selbst gehostetes System','Jedes Tool, solange der Kundenname fehlt'],c:1,fb:{ok:'Richtig. Auch E-Mails enthalten sensible Daten: Kundennamen, Adressen, Mängelbeschreibungen. Nur DSGVO-konforme Systeme verwenden.',no:['Auch "einfache" E-Mails können sensible Daten enthalten. Entscheidend ist der Input, nicht der Output.','Den Kundennamen wegzulassen hilft wenig, wenn Projektstandort und Mängel drin stehen. Personenbezogene Daten umfassen alles, was auf eine Person oder ein Projekt rückschließen lässt.']}},
{sit:'Rein fachliche Recherche: aktuelle Rechtslage bei Flachdachabdichtungen. Keine Kundendaten, kein Projektbezug.',q:'Welches Tool dürfen Sie nutzen?',opts:['Jedes, auch ChatGPT Free, weil keine sensiblen Daten','Nur DSGVO-konforme Tools','Lieber gar kein KI-Tool verwenden, das Risiko ist generell zu hoch bei Fachfragen'],c:0,fb:{ok:'Richtig. Ohne Firmen-, Projekt- oder personenbezogene Daten ist auch ein Tool mit US-Servern nutzbar. Aber: sobald Sie projektspezifische Details ergänzen, ändert sich die Lage.',m:'Die Frage ist nicht "welches Tool", sondern "welche Daten gebe ich ein".',no:['Zu streng. Bei allgemeinen Recherchen ohne Firmenbezug besteht kein Datenschutzproblem.','Unnötig. KI-Tools sind auch für allgemeine Recherche nützlich. Der Schlüssel: allgemeine Fragen sind unkritisch, Firmendaten nur in DSGVO-konforme Systeme.']}}
],summary:'<h4>Die Datenschutz-Faustregel:</h4><p>"Würde ich das auf eine Postkarte schreiben?" Wenn nein: nur DSGVO-konforme Systeme.</p><p><strong>Unbedenklich:</strong> Allgemeine Fachfragen ohne Firmenbezug.</p><p><strong>Nur DSGVO-konform:</strong> Alles mit Kunden-, Projekt- oder Firmendaten.</p><p><strong>Nie in KI-Tools:</strong> Passwörter, Zugangsdaten, Personalakten.</p>'},

{id:'m4',title:'EU AI Act',icon:'ri-government-line',desc:'Pflichten kennen, Risikoklassen verstehen',intro:{ey:'Modul 4 von 5',h:'EU AI Act: Was gilt für uns?',t:'Seit August 2024 gibt es in der EU ein Gesetz für Künstliche Intelligenz. Es betrifft nicht nur KI-Entwickler, sondern auch jedes Unternehmen, das KI-Tools einsetzt. In diesem Modul lernen Sie, was das für Ihr Büro bedeutet.'},scenarios:[
{sit:'In einer Besprechung sagt jemand: "Der EU AI Act gilt erst ab August 2026, wir haben noch Zeit." Ein anderer widerspricht.',q:'Wer hat recht?',opts:['Der Erste hat recht. Vor August 2026 gilt gar nichts, das wurde oft falsch berichtet.','Der Zweite hat recht. Seit Februar 2025 gilt der gesamte AI Act vollständig.','Beide teilweise. Schulungspflicht seit Feb. 2025, Hochrisiko ab Aug. 2026.'],c:2,fb:{ok:'Genau. Stufenweises Inkrafttreten. Die KI-Kompetenz gilt seit dem 2. Februar 2025. Hochrisiko-Regeln und Transparenzpflichten folgen ab August 2026.',iT:'Zeitplan EU AI Act',i:'<h4>Seit 2. Februar 2025:</h4><p>Verbotene KI-Praktiken und Pflicht zur KI-Kompetenz (Art. 4).</p><h4>Ab 2. August 2025:</h4><p>Regeln für KI-Modelle, Governance, nationale Aufsichtsbehörden.</p><h4>Ab 2. August 2026:</h4><p>Hochrisiko-KI-Regeln, Transparenzpflichten, aktive Durchsetzung.</p>',no:['Nicht ganz. Die KI-Kompetenz (Art. 4) gilt bereits seit Februar 2025.','Nicht ganz. Art. 4 gilt seit Februar 2025, aber Hochrisiko-Regeln und Transparenzpflichten erst ab August 2026.']}},
{sit:'Ihr Büro nutzt: (1) ChatGPT für Textarbeit, (2) Microsoft Copilot für E-Mails, (3) ein Tool, das Bewerbungen vorsortiert.',q:'Welches System fällt unter Hochrisiko?',opts:['Alle drei Tools, weil sie alle KI verwenden und damit automatisch Hochrisiko sind','Nur das Bewerbungs-Tool, weil es über Beschäftigung entscheidet','Keines, Ingenieurbüros sind keine kritische Infrastruktur'],c:1,fb:{ok:'Richtig. KI im Bereich Personalauswahl fällt unter Hochrisiko (Anhang III). ChatGPT und Copilot für Büroarbeit: minimales Risiko. Die KI-Kompetenzpflicht gilt aber für alle.',iT:'Die vier Risikoklassen',i:'<h4>Verboten:</h4><p>Social Scoring, manipulative KI, biometrische Massenüberwachung.</p><h4>Hohes Risiko:</h4><p>KI in Beschäftigung, Bildung, Strafverfolgung, kritische Infrastruktur.</p><h4>Begrenztes Risiko:</h4><p>Transparenzpflichten (Chatbots, Deepfakes).</p><h4>Minimales Risiko:</h4><p>Meiste KI-Anwendungen. KI-Kompetenzpflicht gilt trotzdem.</p>',no:['Nicht alle KI-Systeme sind Hochrisiko. Die Einstufung hängt vom Einsatzbereich ab.','Die Branche ist nicht entscheidend. Personalauswahl per KI ist immer Hochrisiko.']}},
{sit:'Ihre Geschäftsführung fragt: "Was müssen wir konkret tun für Artikel 4?"',q:'Die korrekte Antwort?',opts:['Eine offizielle KI-Zertifizierung für alle Mitarbeitenden bei einer akkreditierten Stelle','Nachweisen, dass wir Maßnahmen ergriffen haben. Dokumentation ist entscheidend.','Einen KI-Beauftragten ernennen, der einmal jährlich alle Mitarbeitenden prüft und zertifiziert'],c:1,fb:{ok:'Genau. Art. 4 ist eine Bemühungspflicht ("nach besten Kräften"). Keine vorgeschriebene Methode, keine Zertifizierung. Was zählt: Maßnahmen ergreifen und dokumentieren. Das Teilnahmezertifikat dieser Schulung ist Teil dieser Dokumentation.',m:'Nicht die Form zählt, sondern die Nachweisbarkeit.',no:['Art. 4 verlangt keine formelle Zertifizierung. Eine Schulung mit Teilnahmeprotokoll reicht als Nachweis.','Ein KI-Beauftragter kann sinnvoll sein, ist aber nicht vorgeschrieben. Art. 4 verlangt: Maßnahmen ergreifen und dokumentieren.']}}
],summary:'<h4>Artikel 4 auf den Punkt:</h4><p><strong>Was:</strong> Ausreichende KI-Kompetenz bei allen, die mit KI arbeiten.</p><p><strong>Wie:</strong> Keine vorgeschriebene Methode. Dokumentation ist entscheidend.</p><p><strong>Seit wann:</strong> 2. Februar 2025.</p><p><strong>Sanktionen:</strong> Keine direkten Bußgelder, aber fehlende Schulung ist bei KI-Schäden ein Haftungsrisiko.</p>'},

{id:'m5',title:'Regeln für den Arbeitsalltag',icon:'ri-todo-line',desc:'Sicher handeln in konkreten Bürosituationen',intro:{ey:'Modul 5 von 5',h:'Regeln für den Arbeitsalltag',t:'Jetzt wird es konkret. Fünf typische Situationen aus dem Ingenieurbüro. Entscheiden Sie, wie Sie vorgehen. Keine Fangfragen, nur Praxis.'},scenarios:[
{sit:'Ein neuer Praktikant fragt: "Darf ich ChatGPT für die Arbeit benutzen?"',q:'Was antworten Sie?',opts:['"Ja, KI-Tools sind super hilfreich. ChatGPT, Copilot, alles erlaubt. Probier einfach aus."','"Nein, KI-Tools sind bei uns aus Datenschutzgründen komplett verboten. Zu riskant."','"Kommt drauf an. Allgemeine Fachfragen ja, Firmendaten nur in freigegebene Tools. Ich zeig dir, welche."'],c:2,fb:{ok:'Perfekt. Klare, differenzierte Antwort: allgemeine Nutzung ja, Firmendaten nur in zugelassene Tools. Und Sie bieten an, die Tools zu zeigen.',no:['Zu pauschal. Ohne Unterscheidung könnte der Praktikant Kundendaten in ChatGPT eingeben.','Zu restriktiv. Pauschale Verbote führen oft zu heimlicher Nutzung ohne Datenschutz.']}},
{sit:'19 Uhr, morgen Präsentation. In Ihren Stichpunkten: Projektname, Adresse, technische Details.',q:'Welches Tool für die Präsentationsstruktur?',opts:['ChatGPT Free, geht am schnellsten und ist kostenlos verfügbar','Copilot über Firmen-Tenant oder internes System','Alles händisch, kein Risiko'],c:1,fb:{ok:'Richtig. Projektbezogene Daten gehören nur in DSGVO-konforme Systeme. Die Alternative ist genauso schnell.',no:['Zeitdruck ist kein Datenschutz-Ausschlussgrund. Die DSGVO-konforme Alternative ist genauso schnell.','Nachvollziehbar, aber unnötig. Wenn ein DSGVO-konformes Tool verfügbar ist, nutzen Sie es.']}},
{sit:'Sie haben per KI (zugelassenes Tool) ein Meeting-Protokoll erstellt. Es klingt professionell und vollständig.',q:'Was vor dem Versand an den Kunden?',opts:['Direkt absenden','Gegenlesen, ob alle Punkte stimmen, dann absenden','Komplett neu schreiben, KI-Texten nicht vertrauen'],c:1,fb:{ok:'Genau. KI als Entwurfshilfe, dann gegenlesen: Stimmen Fakten? Wurde etwas ergänzt oder ausgelassen?',no:['Riskant. KI kann Nuancen verändern, Punkte auslassen oder Details hinzufügen.','Zu aufwändig. Der KI-Entwurf ist eine solide Basis. Gegenlesen ist der effiziente Weg.']}},
{sit:'Ein Kollege zeigt Ihnen ein Chrome-Plugin, das jeden markierten Text per KI zusammenfasst. Er nutzt es auch bei internen Dokumenten und Kunden-E-Mails.',q:'Wie bewerten Sie das?',opts:['Praktisch, wenn es funktioniert. Solche Plugins sparen im Alltag enorm viel Zeit.','Problematisch: das Plugin sendet Firmendaten an einen unbekannten Server','Kein Problem bei kurzen Texten'],c:1,fb:{ok:'Genau. Browser-Plugins, die Text an externe Server senden, sind ein oft unterschätztes Datenschutzrisiko.',m:'KI-Plugins unterliegen denselben Regeln wie jedes andere KI-Tool. Im Zweifel: IT fragen.',no:['Vorsicht. Klären Sie zuerst: Wo steht der Server? Gibt es einen DPA? Werden Daten gespeichert?','Die Textlänge ist nicht entscheidend. Auch ein Satz kann sensible Informationen enthalten.']}},
{sit:'Ein Auftraggeber schickt eine große Excel-Datei mit Messdaten. Sie möchten KI zur Analyse nutzen, sind aber unsicher, ob die Daten sensibel sind.',q:'Was tun Sie?',opts:['Im Zweifel kein KI-Tool','Daten in ChatGPT, Messdaten sind keine persönlichen Daten','Beim Vorgesetzten oder der IT nachfragen'],c:2,fb:{ok:'Richtig. Bei Unsicherheit nachfragen. Messdaten können sensibel sein, wenn sie einem Gebäude oder Kunden zuordenbar sind.',m:'Es gibt keine dumme Frage beim Datenschutz. Nachfragen ist immer besser als ein Problem im Nachhinein.',no:['Nachvollziehbar, aber oft unnötig. Wenn ein freigegebenes Tool existiert, fragen Sie nach.','Messdaten können sensibel sein, wenn sie einem Projekt oder Kunden zuordenbar sind. "Keine persönlichen Daten" heißt nicht "darf in jedes Tool".']}}
],summary:'<h4>Ihre Checkliste:</h4><p><strong>VOR der Nutzung:</strong> Enthält mein Input sensible Daten? Wenn ja: nur zugelassene Tools.</p><p><strong>WÄHREND:</strong> Keine Passwörter oder hochsensible Inhalte eingeben.</p><p><strong>NACH:</strong> Output prüfen, bevor er das Büro verlässt.</p><p><strong>BEI UNSICHERHEIT:</strong> Nachfragen.</p><p><strong>NEUE TOOLS:</strong> Keine Installation ohne Rücksprache.</p>'},

{id:'m6',title:'KI-Governance für Entscheider',icon:'ri-user-settings-line',desc:'Haftung, Organisationspflichten, Dokumentation',intro:{ey:'Modul 6 von 7',h:'KI-Governance für Entscheider',t:'Wer KI im Unternehmen einführt, trägt Verantwortung: für Organisation, Dokumentation und Haftung. In diesem Modul lernen Sie, welche Pflichten auf Führungsebene bestehen und wie Sie sich absichern.'},scenarios:[
{sit:'Ein Mitarbeiter hat mit ChatGPT Free eine fehlerhafte Normenrecherche durchgeführt und das Ergebnis ungeprüft in ein Gutachten übernommen. Der Kunde reklamiert. Es gab keine internen Regeln zum KI-Einsatz und keine Schulung.',q:'Wer trägt die Verantwortung?',opts:['Der Mitarbeiter allein, er hat den Fehler gemacht und hätte es prüfen müssen','Das Unternehmen, weil keine Regeln und keine Schulung vorhanden waren','Niemand, KI-Fehler sind höhere Gewalt'],c:1,fb:{ok:'Richtig. Ohne dokumentierte Regeln und Schulung liegt ein Organisationsverschulden vor. Die Geschäftsführung ist verantwortlich für angemessene organisatorische Maßnahmen. Der Mitarbeiter hat zwar den Fehler gemacht, aber das Unternehmen hat ihn nicht in die Lage versetzt, richtig zu handeln.',m:'Organisationsverschulden entsteht, wenn zumutbare Maßnahmen (Schulung, Richtlinien, Prüfprozesse) nicht ergriffen wurden.',no:['Der Mitarbeiter trägt eine Mitverantwortung, aber ohne Schulung und Regeln trifft das Unternehmen das Organisationsverschulden. Die Frage eines Richters wäre: "Wurde der Mitarbeiter geschult? Gab es Richtlinien?"','KI-Fehler sind keine höhere Gewalt. KI-Tools sind Werkzeuge, deren Einsatz organisiert werden muss. Wer sie ohne Regeln einsetzt, haftet für die Folgen.']}},
{sit:'Ihr Büro nutzt seit einem Jahr verschiedene KI-Tools (Copilot, ChatGPT Enterprise, ein internes System). Ein Prüfer fragt: "Können Sie mir Ihre KI-Dokumentation zeigen?"',q:'Was sollten Sie vorweisen können?',opts:['Eine aktuelle Liste aller genutzten KI-Tools reicht als vollständige Dokumentation aus','Schulungsnachweise, interne Richtlinien, Tool-Inventar und Verantwortlichkeiten','Eine ISO-Zertifizierung für KI-Management'],c:1,fb:{ok:'Richtig. Eine vollständige KI-Dokumentation umfasst: welche Tools im Einsatz sind, wer sie nutzen darf, welche Regeln gelten, wer geschult wurde (Nachweise), und wer für die KI-Governance verantwortlich ist. Das muss kein 100-seitiges Dokument sein, aber es muss existieren und aktuell sein.',iT:'Was gehört in die KI-Dokumentation?',i:'<h4>Tool-Inventar:</h4><p>Welche KI-Systeme werden eingesetzt? (Name, Anbieter, Zweck, Risikoklasse)</p><h4>Nutzungsrichtlinie:</h4><p>Wer darf was? Welche Daten in welches Tool? Was ist verboten?</p><h4>Schulungsnachweise:</h4><p>Wer wurde wann geschult? (Teilnahmezertifikate wie dieses hier)</p><h4>Verantwortlichkeiten:</h4><p>Wer ist Ansprechpartner für KI-Fragen? Wer gibt neue Tools frei?</p>',no:['Eine Tool-Liste ist ein Anfang, aber nicht ausreichend. Art. 4 verlangt nachweisbare Maßnahmen zur KI-Kompetenz, nicht nur eine Inventarliste.','Eine ISO 42001-Zertifizierung ist empfehlenswert für KI-Entwickler, aber nicht vorgeschrieben für Betreiber. Art. 4 verlangt angemessene Maßnahmen und Dokumentation, keine formelle Zertifizierung.']}},
{sit:'Sie planen, ein neues KI-Tool für die automatische Angebotserstellung einzuführen. Ihr IT-Leiter sagt: "Einfach installieren, die Mitarbeiter lernen das schon."',q:'Was fehlt bei diesem Vorgehen?',opts:['Nichts, Learning by Doing ist der beste Ansatz','Eine Risikoeinschätzung, Nutzungsregeln, Schulung der betroffenen Mitarbeiter und Dokumentation','Eine externe Beratung durch einen zertifizierten KI-Experten, der die Einführung begleitet'],c:1,fb:{ok:'Richtig. Vor der Einführung eines neuen KI-Tools sollten Sie prüfen: Welche Daten fließen in das Tool? Ist es DSGVO-konform? Welche Risikoklasse hat es? Dann: Nutzungsregeln definieren, betroffene Mitarbeiter schulen, alles dokumentieren. "Learning by Doing" ist bei KI ein Haftungsrisiko.',m:'Neue KI-Tools brauchen einen Freigabeprozess: Risikobewertung, Datenschutzprüfung, Nutzungsregeln, Schulung, Dokumentation.',no:['Learning by Doing funktioniert bei vielen Dingen, aber bei KI entstehen ohne Regeln schnell Datenschutz- und Haftungsprobleme. Die Einführung braucht Struktur.','Externe Beratung kann sinnvoll sein, ist aber nicht vorgeschrieben. Die Verantwortung bleibt beim Unternehmen, unabhängig davon, ob extern beraten wird.']}}
],summary:'<h4>Ihre Governance-Checkliste:</h4><p><strong>Dokumentation:</strong> Tool-Inventar, Nutzungsrichtlinie, Schulungsnachweise, Verantwortlichkeiten.</p><p><strong>Vor jeder Tool-Einführung:</strong> Risikobewertung, Datenschutzprüfung, Nutzungsregeln, Schulung.</p><p><strong>Haftung:</strong> Ohne Schulung und Regeln liegt bei KI-Schäden Organisationsverschulden vor.</p><p><strong>Regelmäßig:</strong> Schulungen auffrischen (mind. jährlich), Dokumentation aktuell halten.</p>'},

{id:'m7',title:'KI-Systeme sicher betreiben',icon:'ri-settings-4-line',desc:'Tool-Auswahl, Datenflüsse, Monitoring',intro:{ey:'Modul 7 von 7',h:'KI-Systeme sicher betreiben',t:'Wer KI-Tools auswählt, einrichtet oder administriert, muss verstehen, wie Daten fließen, welche Risiken bestehen und wie man den sicheren Betrieb gewährleistet. In diesem Modul lernen Sie die technischen und organisatorischen Grundlagen.'},scenarios:[
{sit:'Ihr Büro evaluiert drei KI-Tools für die interne Nutzung: (A) ein US-Cloud-Produkt mit starken Features, (B) ein EU-gehostetes Produkt mit gutem Datenschutz, (C) eine selbst gehostete Open-Source-Lösung.',q:'Nach welchen Kriterien sollten Sie die Entscheidung treffen?',opts:['Nach Features und Preis entscheiden, der Datenschutz wird vom Anbieter sichergestellt','Datenschutz (Serverstandort, DPA), Risikoklasse, Integration, dann Features und Preis','Immer die selbst gehostete Lösung, nur so ist man sicher'],c:1,fb:{ok:'Richtig. Die Reihenfolge ist: Ist es datenschutzkonform (Serverstandort, DPA, DSGVO)? Welche Risikoklasse hat der Einsatzzweck? Lässt es sich in bestehende Systeme integrieren? Erst dann: Features und Preis. Das beste Tool nützt nichts, wenn es nicht DSGVO-konform betrieben werden kann.',m:'Datenschutz und Compliance sind Voraussetzungen, nicht optionale Features.',no:['Features und Preis sind wichtig, aber nachgelagert. Ohne DSGVO-Konformität ist das Tool für Firmendaten nicht einsetzbar, egal wie gut die Features sind.','Self-Hosting gibt maximale Kontrolle, ist aber nicht immer nötig und oft aufwändiger. Ein EU-gehostetes Tool mit DPA kann ebenso DSGVO-konform sein. Die Entscheidung hängt vom konkreten Einsatzzweck ab.']}},
{sit:'Sie haben ein neues KI-Tool eingeführt. Nach zwei Wochen stellen Sie fest, dass einige Mitarbeiter das Tool für Zwecke nutzen, die nicht vorgesehen waren, z.B. um Kundendaten zu analysieren, obwohl es nur für interne Textarbeit freigegeben wurde.',q:'Was tun Sie?',opts:['Tolerieren, solange die Mitarbeiter damit produktiver sind und keine Beschwerden kommen','Sofort die zweckfremde Nutzung unterbinden, Regeln klarstellen, ggf. technisch einschränken','Das Tool komplett abschalten, bis alles geregelt ist'],c:1,fb:{ok:'Richtig. Zweckfremde Nutzung ist ein Datenschutzrisiko. Klare Kommunikation der erlaubten Nutzung, ggf. technische Einschränkungen (Zugriffsrechte, Datenfilter) und Dokumentation der Maßnahme. Kein Vorwurf an die Mitarbeiter, aber klare Regeln.',m:'KI-Tools brauchen klare Nutzungsgrenzen. Was nicht explizit erlaubt ist, sollte nicht angenommen werden.',no:['Produktivität ist kein Argument, wenn Datenschutzregeln verletzt werden. Kundendaten in einem Tool, das nicht dafür freigegeben wurde, ist ein DSGVO-Verstoß.','Komplett abschalten ist eine Überreaktion. Besser: Regeln klarstellen, zweckfremde Nutzung stoppen, ggf. technisch einschränken. Das Tool selbst ist nicht das Problem.']}},
{sit:'Ein Mitarbeiter möchte ein kostenloses KI-Plugin in seinem Browser installieren, das Texte automatisch übersetzt. Das Plugin stammt von einem unbekannten Anbieter.',q:'Wie gehen Sie damit um?',opts:['Erlauben, kostenlose Tools sparen dem Büro Lizenzkosten und die Mitarbeiter sind zufriedener','Vor der Installation prüfen: Wer ist der Anbieter? Wo werden Daten verarbeitet? Gibt es einen DPA? Erst nach Freigabe installieren.','Generell alle Browser-Plugins verbieten, das ist der einzig sichere Weg bei unbekannten Anbietern'],c:1,fb:{ok:'Richtig. Browser-Plugins, die Text verarbeiten, übertragen Daten an externe Server. Vor der Installation muss geprüft werden: Wer betreibt den Server? In welchem Land? Gibt es einen Datenverarbeitungsvertrag? Wird der Text gespeichert oder für Training verwendet? Erst nach positiver Prüfung freigeben.',iT:'Freigabeprozess für neue KI-Tools',i:'<h4>Prüfschritte:</h4><p>1. Anbieter identifizieren (Land, Rechtsform, Reputation)</p><p>2. Datenverarbeitung klären (Serverstandort, Speicherung, Training-Nutzung)</p><p>3. DPA prüfen (Datenverarbeitungsvertrag vorhanden?)</p><p>4. Risikoklasse bestimmen (für welche Daten wird es verwendet?)</p><p>5. Nutzungsregeln definieren und kommunizieren</p><p>6. Freigabe dokumentieren</p>',no:['Kostenlos bedeutet oft: Sie bezahlen mit Ihren Daten. Viele kostenlose Plugins übertragen Texte an Server in unbekannten Ländern, ohne DPA und ohne Löschgarantie.','Ein generelles Plugin-Verbot ist schwer durchzusetzen und verhindert auch nützliche, sichere Tools. Besser: ein Freigabeprozess, der sichere Tools erlaubt und unsichere blockiert.']}}
,
{sit:'Eine Kollegin muss eine Normen-Datenbank durchsuchen. Sie hat gehört, KI könne das automatisieren. Sie gibt der KI den Link zur Datenbank und ihre Login-Daten: "Such dort nach Anforderungen für Flachgründungen."',q:'Was ist das Problem?',opts:['Kein Problem, die KI kann dadurch effizienter arbeiten und findet schneller Ergebnisse','Die Login-Daten wurden an einen externen Dienst weitergegeben. Passwörter gehören nie in ein KI-Tool.','Nur problematisch, wenn es ein US-Tool ist. Bei EU-gehosteten Tools wäre es in Ordnung.'],c:1,fb:{ok:'Richtig. Passwörter und Zugangsdaten gehören nie in ein KI-Tool, egal welches. Die KI speichert oder verarbeitet den Text, und damit potenziell die Credentials. Das ist ein Sicherheitsrisiko unabhängig vom Serverstandort.',m:'Passwörter, API-Keys und Zugangsdaten: nie in ein KI-Tool eingeben. Weder ChatGPT, noch Copilot, noch selbst gehostete Systeme.',no:['Login-Daten in einem KI-Tool sind immer ein Sicherheitsrisiko. Die Daten können gespeichert, protokolliert oder im Klartext verarbeitet werden.','Auch bei EU-gehosteten Tools dürfen keine Passwörter eingegeben werden. Es geht nicht um den Serverstandort, sondern darum, dass Credentials nie in Texteingabefelder gehören.']}}
],summary:'<h4>Ihre Betriebscheckliste:</h4><p><strong>Tool-Auswahl:</strong> Datenschutz und Compliance vor Features. Serverstandort, DPA, Risikoklasse prüfen.</p><p><strong>Freigabeprozess:</strong> Kein neues KI-Tool ohne Prüfung und dokumentierte Freigabe.</p><p><strong>Monitoring:</strong> Regelmäßig prüfen, ob Tools wie vorgesehen genutzt werden.</p><p><strong>Plugins/Erweiterungen:</strong> Gleiche Regeln wie für jedes andere KI-Tool. Im Zweifel: erst prüfen, dann freigeben.</p>'}
];

let currentLang = 'de';

const EN = {
  roles: {
    anwender: {label:'AI User', desc:'I use AI tools in my daily work.'},
    fuehrung: {label:'AI User + Management', desc:'I make decisions about AI adoption in the company.'},
    technik: {label:'AI User + Technical Responsibility', desc:'I select, administer, or integrate AI tools.'}
  },
  modules: {
    m1: {
      title:'What is AI?', desc:'Identify what is AI and what is not',
      intro:{ey:'Module 1 of 5',h:'What is Artificial Intelligence?',t:'You encounter AI in your daily work more often than you might think. Some tools you use every day rely on AI in the background. Others that feel "intelligent" do not. In this module, you will learn to tell the difference.'},
      summary:'<h4>Three types of AI:</h4><p><strong>Generative AI</strong> creates new content (ChatGPT, Claude). Risk: hallucinations, including legal texts and standards.</p><p><strong>Analytical AI</strong> recognizes patterns (spam filters, DMS). Risk: misclassification.</p><p><strong>Rule-based automation</strong> is not AI (Excel formulas, macros). The EU AI Act only applies to actual AI systems.</p>',
      scenarios:[
        {sit:'Your colleague says: "I don\'t use any AI at work." She works daily with Microsoft Outlook (with Copilot features), an Excel spreadsheet with IF formulas, Google Maps for site navigation, and a spam filter.',q:'Which of these tools use AI?',opts:['Only Microsoft Copilot','Copilot and the spam filter','Copilot, the spam filter, and Google Maps','All four, including Excel formulas'],fb:{ok:'Correct. Microsoft Copilot is generative AI. The spam filter uses machine learning. Google Maps uses ML for traffic predictions (routing itself uses classical algorithms). Excel formulas are rule-based automation: fixed rules without "learning".',no:['Not quite. The spam filter also uses machine learning, and Google Maps uses ML for traffic predictions.','Not quite. Google Maps also uses ML for traffic predictions and route optimization.','Close. Excel formulas are not AI. They follow fixed rules: IF A>B, THEN C. No learning. The other three do use AI.']}},
        {sit:'Your supervisor asks: "What\'s the difference between ChatGPT and the automatic categorization in our document management system?"',q:'What is the key difference?',opts:['ChatGPT is an external service, the DMS is internal. Different price, different category.','ChatGPT generates new content, the DMS sorts existing content by learned patterns','ChatGPT is real AI, the DMS is just software','No significant difference, both are AI'],fb:{ok:'Correct. ChatGPT is generative AI: creates new texts. The DMS uses analytical AI: recognizes patterns and sorts. Generative AI can "hallucinate," analytical AI can misclassify but doesn\'t invent content.',no:['Price is not the difference. ChatGPT creates new content (generative), the DMS sorts existing (analytical). Both are AI, with different risks.','Both are AI, just different types. The distinction affects how carefully you handle the output.','Both are AI, but the difference matters: generative AI creates new content (hallucination risk), analytical AI sorts existing data.']}},
        {sit:'Management wants an inventory: Which AI systems does the department use?',q:'Which activity uses AI?',opts:['Automatic email dispatch every Monday at 8:00','A tool that creates a structured protocol from a dictation','An Excel pivot table summarizing project costs','A macro that renames files by fixed pattern'],fb:{ok:'Correct. Converting speech into structured text requires speech recognition and text processing (AI). The others are rule-based automation without learning.',no:['Rule-based automation. Converting speech to structured text requires AI.','Rule-based automation. Converting speech to structured text requires AI.','Fixed pattern, no learning. Converting speech to structured text requires AI.']}},
        {sit:'A colleague has AI summarize measurement values from an inspection report. The AI writes: "All values are within the standard range." The original contains 47 individual measurements.',q:'Can you trust the summary?',opts:['Yes, AI is particularly good with numbers and tables','Not without spot-checking. AI can overlook individual outliers.','Only if you explicitly ask the AI about outliers'],fb:{ok:'Correct. AI language models are text-based. They read numbers as words, not mathematical values. A value just above threshold can be lost in a summary. Always spot-check safety-relevant data.',m:'AI is strong at text summaries but not reliable for interpreting measurement values.',no:['AI language models don\'t calculate. They process numbers as text and can miss outliers.','Even with targeted follow-up, AI can misinterpret numbers. Spot-checking the original remains essential.']}}
      ]
    },
    m2: {
      title:'Opportunities and Limits', desc:'Critically evaluate AI outputs',
      intro:{ey:'Module 2 of 5',h:'Opportunities and Limits of AI',t:'AI tools can save enormous time in engineering offices. But they have a critical weakness: they always sound convincing, even when wrong. In this module, you learn how to properly assess AI outputs.'},
      summary:'<h4>Three rules for AI outputs:</h4><p><strong>1. Never use unchecked.</strong> Especially standards references, numbers, and technical details.</p><p><strong>2. AI is a drafting aid, not a final product.</strong> Review and approval remain with you.</p><p><strong>3. When in doubt: original source.</strong> "The AI wrote that" is not a liability disclaimer.</p>',
      scenarios:[
        {sit:'You use an AI tool for standards research. It returns:',ai:'"According to ÖNORM B 4700-2:2023, Section 7.3.2, the minimum reinforcement is 0.15% of the concrete cross-section."',sitA:'The answer sounds detailed and convincing.',q:'What do you do?',opts:['Use directly in my calculation','Look up the section in the original standard and verify','Ask an experienced colleague who knows the standard and accept their assessment'],fb:{ok:'Correct. In this case, ÖNORM B 4700-2:2023 does not exist in this form. The tool generated a plausible but fabricated standard.',m:'AI tools don\'t know "truth." The more specific the citation, the higher the hallucination risk.',no:['Dangerous. AI can fabricate standards that look correct. In this case, the ÖNORM doesn\'t exist. Liability risk.','Better than direct use, but your colleague might also find it plausible. Only safe check: compare with the original.']}},
        {sit:'You have an 80-page expert report summarized by AI. It says "no significant defects." You vaguely remember something about facade cracks in the original.',q:'How do you proceed?',opts:['The summary is fine, the detail was unimportant','Look up the section in the original and correct it','Ask the AI again: "Weren\'t there defects?"'],fb:{ok:'Correct. AI summaries can omit or reweight information. The original is always the authoritative reference.',m:'AI summaries are working aids, not substitute documents. The longer the original, the more likely details are lost.',no:['Risky. An AI summary can omit critical info. If you forward the report, you bear responsibility.','The AI might confirm but misdescribe the defect. Only safe method: check the original.']}},
        {sit:'A colleague created a proposal draft using AI. Professional text, but contains services your office doesn\'t offer.',q:'How do you evaluate this?',opts:['Delete the obviously wrong items and send directly','AI should not be used for proposals','AI as drafting aid is useful, but output must be fully reviewed'],fb:{ok:'Exactly. AI tools are excellent drafting aids but don\'t know your office. Any output leaving the office must be reviewed and approved.',m:'AI creates the draft, you bear the responsibility.',no:['Correcting obvious errors isn\'t enough. What about subtler mistakes? Full review needed.','Too broad. AI saves considerable time with proposals. The problem isn\'t the tool, but the missing review.']}}
      ]
    },
    m3: {
      title:'Data Protection and GDPR', desc:'Know which data goes into which tool',
      intro:{ey:'Module 3 of 5',h:'Data Protection and GDPR',t:'Every time you enter text into an AI tool, data is transmitted to a server. Where is that server? What happens to your data? In this module, you learn which tools are safe and which are not.'},
      summary:'<h4>The data protection rule of thumb:</h4><p>"Would I write this on a postcard?" If not: only GDPR-compliant systems.</p><p><strong>Safe:</strong> General technical questions without company reference.</p><p><strong>GDPR-compliant only:</strong> Anything with client, project, or company data.</p><p><strong>Never in AI tools:</strong> Passwords, access credentials, personnel files.</p>',
      scenarios:[
        {sit:'Friday afternoon, deadline Monday. You need to summarize a 40-page bill of quantities. A colleague says: "Copy it into ChatGPT, takes 2 minutes." She has a private ChatGPT Plus account.',q:'What do you do?',opts:['Good idea, Plus is the paid version','The BoQ contains client data, this must not go into ChatGPT','Just copy the part without client names'],fb:{ok:'Correct. ChatGPT Plus is a consumer license. Data on US servers, no DPA (Data Processing Agreement). Bills of quantities contain project names, client names, addresses.',iT:'Consumer vs. Business Licenses',i:'<h4>Not GDPR-compliant for company data:</h4><p>ChatGPT Free/Plus/Pro, Google Gemini, Grok Free, Perplexity. US servers, no DPA.</p><h4>Conditionally GDPR-compliant:</h4><p>Microsoft Copilot via M365 tenant (EU Data Boundary). ChatGPT Enterprise (EU data residency, but US jurisdiction).</p><h4>Full control:</h4><p>Self-hosted systems. All data in the EU or in-house.</p>',no:['"Paid" does not mean "GDPR-compliant." ChatGPT Plus is a consumer license with US servers and no DPA.','Hardly feasible. Bills of quantities almost always contain indirectly identifiable information.']}},
        {sit:'A colleague says: "Copilot and ChatGPT are the same thing. Why can I use Copilot but not ChatGPT?"',q:'What is the correct answer?',opts:['True, both use AI models and should be banned. Too risky.','Similar technology, different data protection. Copilot: EU. ChatGPT Free: US.','ChatGPT has better models. Best to buy Enterprise, then everything is covered.'],fb:{ok:'Exactly. Both use similar language models. But Copilot via M365 tenant processes data in the EU. ChatGPT Free/Plus does not.',m:'The problem is not the technology, but where data is processed.',no:['Copilot via M365 is GDPR-compliant. Banning everything removes a significant productivity advantage.','ChatGPT Enterprise is better than consumer version but remains US provider under US jurisdiction (CLOUD Act).']}},
        {sit:'You want to draft an email to a client. Your notes: client name, building, identified defects.',q:'Which tool may you use?',opts:['ChatGPT Plus, the paid version is GDPR-compliant enough','Microsoft Copilot via company tenant or self-hosted system','Any tool, as long as the client name is removed'],fb:{ok:'Correct. Even emails contain sensitive data: client names, addresses, defect descriptions. Only GDPR-compliant systems.',no:['Even "simple" emails can contain sensitive data. What matters is the input, not the output.','Removing the client name helps little if project location and defects remain.']}},
        {sit:'Purely technical research: current legal situation for flat roof sealing. No client data, no project reference.',q:'Which tool may you use?',opts:['Any tool, including ChatGPT Free, because no sensitive data','Only GDPR-compliant tools','Better not use any AI tool, the risk is too high'],fb:{ok:'Correct. Without company, project, or personal data, even a US-server tool is usable. But: as soon as you add project details, the situation changes.',m:'The question is not "which tool" but "what data am I entering."',no:['Too strict. For general research without company reference, no data protection issue.','Unnecessary. AI tools are useful for general research. General questions are uncritical, company data only in GDPR-compliant systems.']}},
        {sit:'A colleague gives an AI her database login credentials: "Search for requirements for shallow foundations."',q:'What is the problem?',opts:['No problem, AI can work more efficiently this way','Login credentials were shared with an external service. Passwords never belong in AI tools.','Only problematic if it\'s a US tool. EU-hosted would be fine.'],fb:{ok:'Correct. Passwords and credentials never belong in any AI tool. Security risk regardless of server location.',m:'Passwords, API keys, credentials: never enter into any AI tool.',no:['Login credentials in AI tools are always a security risk. Data can be stored or logged.','Even with EU tools, no passwords. It\'s not about server location but that credentials never belong in text inputs.']}}
      ]
    },
    m4: {
      title:'EU AI Act', desc:'Know obligations, understand risk classes',
      intro:{ey:'Module 4 of 5',h:'EU AI Act: What applies to us?',t:'Since August 2024, there is an EU law for artificial intelligence. It affects not only AI developers but every company using AI tools. In this module, you learn what this means for your office.'},
      summary:'<h4>Article 4 in a nutshell:</h4><p><strong>What:</strong> Sufficient AI competence for everyone working with AI.</p><p><strong>How:</strong> No prescribed method. Documentation is key.</p><p><strong>Since when:</strong> February 2, 2025.</p><p><strong>Penalties:</strong> No direct fines, but lack of training is a liability risk.</p>',
      scenarios:[
        {sit:'In a meeting: "The EU AI Act only applies from August 2026, we have time." Another disagrees.',q:'Who is right?',opts:['The first one. Nothing applies before August 2026.','The second one. Since February 2025, the entire Act is fully in effect.','Both partially. Training since Feb. 2025, high-risk from Aug. 2026.'],fb:{ok:'Correct. Phased implementation. AI competence mandatory since February 2, 2025. High-risk rules follow from August 2026.',iT:'EU AI Act Timeline',i:'<h4>Since February 2, 2025:</h4><p>Prohibited AI practices and AI competence obligation (Art. 4).</p><h4>From August 2, 2025:</h4><p>Rules for AI models, governance, national authorities.</p><h4>From August 2, 2026:</h4><p>High-risk AI rules, transparency obligations, active enforcement.</p>',no:['Not quite. AI competence (Art. 4) has been in effect since February 2025.','Not quite. Art. 4 since February 2025, but high-risk rules only from August 2026.']}},
        {sit:'Three AI systems in use: (A) AI pre-sorting job applications, (B) ChatGPT for internal text, (C) AI-assisted time tracking.',q:'Which is high-risk per EU AI Act?',opts:['All three, because they all use AI','Only the application tool, because it decides about employment','ChatGPT, because it\'s the most powerful'],fb:{ok:'Correct. AI making decisions about employment/recruitment is high-risk. ChatGPT for text and time tracking are minimal risk.',m:'High-risk = impact on fundamental rights. Employment, education, law enforcement.',no:['Not all AI is high-risk. Classification depends on use case, not technology.','ChatGPT for text is minimal risk. Model power is irrelevant for classification.']}},
        {sit:'CEO asks: "What exactly do we need to do for Article 4?"',q:'The correct answer?',opts:['Official AI certification for all employees at an accredited body','Demonstrate that we took measures. Documentation is key.','Appoint an AI officer who tests all employees annually'],fb:{ok:'Exactly. Art. 4 is a best-effort obligation. No prescribed method, no certification. What counts: take measures and document them.',m:'Not the form matters, but verifiability.',no:['Art. 4 doesn\'t require formal certification. Training with participation records suffices.','An AI officer can be useful but isn\'t required. Art. 4 requires: take measures and document.']}}
      ]
    },
    m5: {
      title:'Rules for the Workplace', desc:'Act safely in concrete office situations',
      intro:{ey:'Module 5 of 5',h:'Rules for the Workplace',t:'Now it gets concrete. Five typical situations from engineering offices. Decide how you proceed. No trick questions, just practice.'},
      summary:'<h4>Five practical rules:</h4><p><strong>1. Postcard rule:</strong> Would I write this on a postcard? If not → only GDPR-compliant tool.</p><p><strong>2. AI is a draft.</strong> Everything leaving the office must be reviewed.</p><p><strong>3. Always verify standards in original.</strong></p><p><strong>4. Uncertainty → ask.</strong> Better one question too many.</p><p><strong>5. Document everything.</strong></p>',
      scenarios:[
        {sit:'New colleague, first week. A trainee asks: "Can I use AI tools for my work?"',q:'Your answer?',opts:['Yes, everything is allowed. Just try it out.','No, AI tools are completely banned here.','Depends. General questions yes, company data only in approved tools.'],fb:{ok:'Correct. Clear guidance instead of blanket ban or approval.',m:'Onboarding includes AI rules.',no:['Too broad. Without guidance, the trainee might enter client data into ChatGPT Free.','Too strict. AI tools are useful. A blanket ban prevents progress.']}},
        {sit:'Deadline pressure. A colleague summarizes a building protocol with AI and sends it directly to the client.',q:'What is the problem?',opts:['No problem, saves time','Protocol must be reviewed before sending, AI can omit critical details','Only problematic if AI is not GDPR-compliant'],fb:{ok:'Correct. AI summaries can omit or distort details. Everything going to a client must be reviewed.',m:'Deadline pressure does not suspend the review obligation.',no:['Time saving isn\'t an argument if quality suffers. AI summaries can omit critical details.','GDPR is one aspect, but content must also be reviewed.']}},
        {sit:'A protocol needs to be quickly summarized and sent.',q:'Safest tool?',opts:['ChatGPT Free, fastest and free','Copilot via company tenant or internal system','Any tool, protocol has no personal data'],fb:{ok:'Correct. Protocols typically contain project data, names, dates. Only GDPR-compliant systems.',no:['ChatGPT Free stores data on US servers without DPA. Protocols contain project data.','Even without obvious personal data, protocols include project references and decisions.']}},
        {sit:'AI creates an email draft for a client. Text is good, ready to send.',q:'What do you do?',opts:['Send directly','Review all points, then send','Have a colleague also check, AI texts are always wrong'],fb:{ok:'Correct. AI drafts are starting points. Check: facts correct? Tone appropriate? Hallucinated details?',m:'Every document leaving the office carries your name, not the AI\'s.',no:['Risky. AI drafts can contain subtle errors.','Too cautious. AI texts aren\'t "always wrong" but need review.']}},
        {sit:'A colleague shows you a Chrome plugin that summarizes highlighted text via AI. He uses it for internal documents and client emails.',q:'How do you evaluate this?',opts:['Practical, saves a lot of time.','Problematic: the plugin sends company data to an unknown server','No problem with short texts'],fb:{ok:'Correct. Browser plugins sending text to external servers are an often underestimated data protection risk.',m:'AI plugins follow the same rules as any other AI tool. When in doubt: ask IT.',no:['Caution. Where is the server? Is there a DPA? Is data stored?','Text length is not decisive. Even one sentence can contain sensitive info.']}}
      ]
    },
    m6: {
      title:'AI Governance for Decision-Makers', desc:'Liability, organizational duties, documentation',
      intro:{ey:'Module 6 of 7',h:'AI Governance for Decision-Makers',t:'Anyone introducing AI bears responsibility: for organization, documentation, and liability. In this module, you learn what obligations exist at management level.'},
      summary:'<h4>Your governance checklist:</h4><p><strong>Documentation:</strong> Tool inventory, usage policy, training records, responsibilities.</p><p><strong>Before tool introduction:</strong> Risk assessment, data protection check, usage rules, training.</p><p><strong>Liability:</strong> Without training and rules, organizational fault applies.</p><p><strong>Regularly:</strong> Refresh training (at least annually), keep documentation current.</p>',
      scenarios:[
        {sit:'Employee publishes a ChatGPT text with an incorrect standards reference. Client suffers a loss.',q:'Who is liable?',opts:['The employee alone, they made the mistake','The company, because no rules and no training were in place','Only the AI provider'],fb:{ok:'Correct. Organizational fault. Without rules and training, the company is liable.',m:'A court doesn\'t ask if AI was at fault. It asks: Were there training and rules?',no:['Shared responsibility possible, but primary liability lies with the organization.','AI providers generally aren\'t liable for output. Responsibility lies with user and organization.']}},
        {sit:'As department head, you must document AI usage per EU AI Act.',q:'What do you need at minimum?',opts:['A list of all AI tools used is sufficient','Training records, internal guidelines, tool inventory, and responsibilities','A signed declaration from each employee'],fb:{ok:'Correct. Documentation: Which tools? What rules? Who was trained when? Who is responsible?',m:'Documentation is insurance. In an incident, it decides between compliance and organizational fault.',no:['A tool list is a start but not sufficient. Training records, rules, and responsibilities also required.','A declaration doesn\'t substitute actual training and measures.']}},
        {sit:'A new AI tool is to be introduced.',q:'What needs to happen before employees may use it?',opts:['Risk assessment, usage rules, training, and documentation','External consultation by a certified AI expert','Test for two weeks, then decide based on feedback'],fb:{ok:'Correct. Before introduction: risk assessment, usage rules, training, documentation.',m:'No AI tool without prior risk assessment and documented rules.',no:['External consultation can help but isn\'t legally required.','A test without prior assessment can cause data protection violations from day one.']}}
      ]
    },
    m7: {
      title:'Operating AI Systems Safely', desc:'Tool selection, data flows, monitoring',
      intro:{ey:'Module 7 of 7',h:'Operating AI Systems Safely',t:'Anyone selecting, setting up, or administering AI tools must understand data flows, risks, and safe operation. In this module, you learn the technical and organizational basics.'},
      summary:'<h4>Your operations checklist:</h4><p><strong>Tool selection:</strong> Data protection before features. Server location, DPA, risk class.</p><p><strong>Approval process:</strong> No new AI tool without review and documented approval.</p><p><strong>Monitoring:</strong> Regularly check tools are used as intended.</p><p><strong>Plugins:</strong> Same rules as any other AI tool.</p>',
      scenarios:[

function _e(modId) { return (currentLang==='en' && EN.modules[modId]) ? EN.modules[modId] : null; }
function _es(modId, si) { const m = _e(modId); return (m && m.scenarios && m.scenarios[si]) ? m.scenarios[si] : null; }
function _er(roleId) { return (currentLang==='en' && EN.roles[roleId]) ? EN.roles[roleId] : null; }
function _t(de, en) { return currentLang==='en' ? en : de; }

let selectedRole = null;
let activeModules = []; // filtered M based on role

// State
let cMod=-1,cStep=0,ans={},totalQ=0;
const $=id=>document.getElementById(id);
let sc,pf,pl;

function initDom(){sc=$('sc');pf=$('pf');pl=$('pl');}

function getActiveModules(){
  if(!selectedRole) return M.slice(0,5);
  const r = ROLES.find(r=>r.id===selectedRole);
  return M.filter(m=>r.mods.includes(m.id));
}

function recalcTotal(){
  activeModules = getActiveModules();
  totalQ=0;
  activeModules.forEach(m=>{totalQ+=m.scenarios.length});
}

function updProg(){
  let d=0;for(let k in ans)d++;
  pf.style.width=totalQ?Math.round(d/totalQ*100)+'%':'0%';
  pl.textContent=cMod<0?'Willkommen':cMod>=activeModules.length?'Abschluss':'Modul '+(cMod+1)+' von '+activeModules.length;
}

function allAnswered(){
  let needed=0,have=0;
  activeModules.forEach(m=>{m.scenarios.forEach((_,i)=>{needed++;if(ans[m.id+'_'+i]!==undefined)have++;});});
  return have>=needed;
}

function go(){
  if(cMod<0)rWelcome();
  else if(cMod>=activeModules.length)rFinish();
  else{const m=activeModules[cMod];if(cStep===0)rIntro(m);else if(cStep<=m.scenarios.length)rScen(m,cStep-1);else rSum(m);}
  updProg();window.scrollTo({top:0,behavior:'smooth'});
}

function rScen(m,si){

  const _sit=(es&&es.sit)||s.sit, _q=(es&&es.q)||s.q, _opts=(es&&es.opts)||s.opts;
  const _ai=(es&&es.ai)||s.ai, _sitA=(es&&es.sitA)||s.sitA;
  const _fbok=(es&&es.fb&&es.fb.ok)||s.fb.ok;
  const _fbm=(es&&es.fb&&es.fb.m)||(s.fb&&s.fb.m)||'';
  const _fbi=(es&&es.fb&&es.fb.i)||(s.fb&&s.fb.i)||'';
  const _fbiT=(es&&es.fb&&es.fb.iT)||(s.fb&&s.fb.iT)||'';
  // Scenario nav
  let nav='<div class="scn-nav">';
  m.scenarios.forEach((sc2,i)=>{
    const k2=m.id+'_'+i,done=ans[k2]!==undefined,act=i===si;
    let cls='scn-dot';
    if(act)cls+=' active';else if(done)cls+=' done';else cls+=' locked';
    const click=done&&!act?`onclick="cStep=${i+1};go()"`:act?'':'';
    nav+=`<div class="${cls}" ${click}>${i+1}</div>`;
    if(i<m.scenarios.length-1)nav+='<span class="scn-sep">&middot;</span>';
  });
  nav+='</div>';

  let sitH=`<p>${_sit}</p>`;
  if(s.ai)sitH+=`<div class="ai-out">${_ai}</div>`;
  if(s.sitA)sitH+=`<p>${_sitA}</p>`;

  let optsH=_opts.map((o,i)=>{
    const lt=String.fromCharCode(65+i);
    let cl='ob';
    if(wa){cl+=' dis';if(i===s.c)cl+=' ok';else if(i===ans[key])cl+=' no';}
    return`<button class="${cl}" ${wa?'':`onclick="pick('${key}',${i})"`}><span class="lt">${lt}</span><span>${o}</span></button>`;
  }).join('');

  let fbH='';
  if(wa){
    const ok=ans[key]===s.c;
    let txt='';
    if(ok){
      txt=`<p>${_fbok}</p>`;
      if(s.fb.m)txt+=`<div class="merke">${_fbm}</div>`;
    }else{
      const wi=ans[key]<s.c?ans[key]:ans[key]-1;
      const _fbno=(es&&es.fb&&es.fb.no)||s.fb.no;
      txt=`<p>${_fbno[ans[key]]||_fbno[0]}</p><p style="margin-top:8px;font-weight:700">${L?'Correct answer':'Richtige Antwort'}: ${String.fromCharCode(65+s.c)}</p>`;
      if(s.fb.m)txt+=`<div class="merke">${_fbm}</div>`;
    }
    let infoH='';
    if(s.fb.i)infoH=`<div class="ix"><button class="ix-btn" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('show')"><i class="ri-arrow-down-s-line"></i> ${_fbiT||(L?'Learn more':'Mehr erfahren')}</button><div class="ix-body">${_fbi}</div></div>`;

    // Next button logic
    let nextBtn='';
    const isLast=si===m.scenarios.length-1;
    if(isLast){
      nextBtn=`<button class="btn-p" onclick="cStep++;go()">${L?'Summary':'Zusammenfassung'} <i class="ri-arrow-right-line"></i></button>`;
    }else{
      nextBtn=`<button class="btn-p" onclick="cStep++;go()">${L?'Next scenario':'Nächstes Szenario'} <i class="ri-arrow-right-line"></i></button>`;
    }

    fbH=`<div class="fb ${ok?'fb-ok':'fb-no'}"><div class="ft">${ok?`<i class="ri-check-line"></i> ${L?'Correct!':'Richtig!'}`:`<i class="ri-close-line"></i> ${L?'Not quite.':'Nicht ganz.'}`}</div>${txt}${infoH}</div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end">${nextBtn}</div>`;
  }

  sc.innerHTML=`<div class="card">
    ${nav}
    <div class="badge"><i class="${m.icon}"></i> ${L?'Module':'Modul'} ${cMod+1} ${L?'of':'von'} ${activeModules.length} &mdash; ${L?'Scenario':'Szenario'} ${si+1}/${m.scenarios.length}</div>
    <div class="situ"><div class="lbl">${L?'Scenario':'Situation'}</div>${sitH}</div>
    <div class="q-text">${_q}</div>
    <div class="opts">${optsH}</div>
    ${fbH}
  </div>`;
}

function genCert(){
  const n=$('cN').value.trim(),r=$('cR').value.trim(),c=$('cC').value.trim();
  if(!n){$('cN').style.borderColor='#c0392b';$('cN').focus();return;}

  // Fill the HTML certificate preview
  $('cdN').textContent=n;
  $('cdR').textContent=r||'';$('cdR').style.display=r?'block':'none';
  $('cdC').textContent=c||'';$('cdC').style.display=c?'block':'none';
  if(r&&$('cdRoleCtx'))$('cdRoleCtx').textContent='branchenspezifisch für Ingenieurbüros konzipiert und im Kontext der Rolle "'+r+'" durchgeführt';
  $('cg').classList.add('show');

  const btn=document.querySelector('.btn-p[onclick="genCert()"]');
  const origText=btn.innerHTML;
  btn.innerHTML='<i class="ri-loader-4-line"></i> PDF wird erstellt...';
  btn.disabled=true;

  const modDescsLocal={
    m1:'Generative KI, analytische KI, regelbasierte Automatisierung. KI-Systeme im Arbeitsumfeld identifizieren.',
    m2:'KI-Outputs kritisch bewerten. Halluzinationen erkennen. Prüfpflicht vor Weitergabe.',
    m3:'Konsumenten- vs. Business-Lizenzen. DSGVO-konforme Tool-Auswahl. Umgang mit Firmen- und Kundendaten.',
    m4:'Verordnung (EU) 2024/1689. Risikoklassen. Art. 4 Pflichten. Dokumentationsanforderungen.',
    m5:'Onboarding, Zeitdruck, KI-Dokumente prüfen, Browser-Plugins bewerten, Verhalten bei Unsicherheit.',
    m6:'Organisationsverschulden, KI-Dokumentation, Haftung, Freigabeprozesse für neue KI-Tools.',
    m7:'Tool-Auswahl und Datenschutzprüfung, Datenflüsse, Monitoring, Freigabeprozess für Plugins und Erweiterungen.'
  };
  const modDescsEN={
    m1:'Generative AI, analytical AI, rule-based automation. Identifying AI systems in the workplace.',
    m2:'Critically evaluating AI outputs. Recognizing hallucinations. Verification before use.',
    m3:'Consumer vs. business licenses. GDPR-compliant tool selection. Handling company and client data.',
    m4:'Regulation (EU) 2024/1689. Risk classes. Art. 4 obligations. Documentation requirements.',
    m5:'Onboarding, time pressure, reviewing AI documents, evaluating browser plugins, handling uncertainty.',
    m6:'Organizational fault, AI documentation, liability, approval processes for new AI tools.',
    m7:'Tool selection and data protection review, data flows, monitoring, approval process for plugins.'
  };
  const isEN=currentLang==='en';
  const today=new Date().toLocaleDateString(isEN?'en-GB':'de-AT',{day:'2-digit',month:'2-digit',year:'numeric'});
  const roleLbl=selectedRole?((isEN&&_er(selectedRole))?_er(selectedRole).label:ROLES.find(rx=>rx.id===selectedRole).label):(isEN?'AI User':'KI-Anwender');
  const scCount=activeModules.reduce((a,m)=>a+m.scenarios.length,0);
  const modulesData=activeModules.map(m=>{
    const em=_e(m.id);
    return{title:(isEN&&em)?em.title:m.title,desc:isEN?(modDescsEN[m.id]||modDescsLocal[m.id]):(modDescsLocal[m.id]||m.desc)};
  });

  // Try server-side PDF first
  fetch('/api/certificate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:n,role:r,company:c,date:today,modules:modulesData,scCount:scCount,roleLbl:roleLbl,lang:currentLang})
  }).then(res=>{
    if(!res.ok)throw new Error('Server returned '+res.status);
    return res.blob();
  }).then(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=(isEN?'AI-Awareness-Certificate_':'KI-Awareness-Zertifikat_')+n.replace(/[^a-zA-Z0-9]/g,'_')+'.pdf';
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    btn.innerHTML=origText;btn.disabled=false;
    setTimeout(()=>$('cg').scrollIntoView({behavior:'smooth',block:'start'}),100);
  }).catch(err=>{
    console.warn('Server PDF failed, using client fallback:',err);
    genCertFallback(n,btn,origText);
  });
}

function genCertFallback(n,btn,origText){
  if(!window.jspdf||!window.html2canvas){alert('PDF konnte nicht erstellt werden. Bitte Seite neu laden.');btn.innerHTML=origText;btn.disabled=false;return;}
  setTimeout(()=>{
    html2canvas($('cdoc'),{scale:4,useCORS:true,backgroundColor:'#ffffff',logging:false}).then(canvas=>{
      const {jsPDF}=window.jspdf;
      const imgData=canvas.toDataURL('image/jpeg',0.92);
      const pdfW=210,pdfH=297,marginX=10,maxW=pdfW-marginX*2;
      const imgAspect=canvas.height/canvas.width;
      let imgW=maxW,imgH=imgW*imgAspect;
      const maxH=pdfH-20;
      if(imgH>maxH){imgH=maxH;imgW=imgH/imgAspect;}
      const doc=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
      doc.addImage(imgData,'JPEG',(pdfW-imgW)/2,10,imgW,imgH);
      doc.save('KI-Awareness-Zertifikat_'+n.replace(/[^a-zA-Z0-9]/g,'_')+'.pdf');
      btn.innerHTML=origText;btn.disabled=false;
      setTimeout(()=>$('cg').scrollIntoView({behavior:'smooth',block:'start'}),100);
    }).catch(err=>{
      console.error('PDF error:',err);
      alert('PDF konnte nicht erstellt werden: '+err.message);
      btn.innerHTML=origText;btn.disabled=false;
    });
  },300);
}

// Code validation
let codeValidated = false;

async function validateCode() {
  const input = $('codeInput');
  const errEl = $('codeError');
  const loadEl = $('codeLoading');
  const code = input.value.trim().toUpperCase();
  
  errEl.style.display = 'none';
  
  if (!code || code.length < 6) {
    errEl.textContent = 'Bitte geben Sie einen 6-stelligen Code ein.';
    errEl.style.display = 'block';
    input.style.borderColor = '#c0392b';
    input.focus();
    return;
  }
  
  loadEl.style.display = 'block';
  $('codeBtn').disabled = true;
  
  try {
    const resp = await fetch('/api/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code, action: 'consume' })
    });
    const data = await resp.json();
    
    loadEl.style.display = 'none';
    $('codeBtn').disabled = false;
    
    if (data.valid) {
      codeValidated = true;
      rRoleSelect();
      window.scrollTo({top:0,behavior:'smooth'});
    } else {
      errEl.textContent = data.error || 'Ungültiger Code.';
      errEl.style.display = 'block';
      input.style.borderColor = '#c0392b';
      input.focus();
    }
  } catch (e) {
    loadEl.style.display = 'none';
    $('codeBtn').disabled = false;
    errEl.textContent = 'Verbindungsfehler. Bitte versuchen Sie es erneut.';
    errEl.style.display = 'block';
  }
}
